services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pizza_vitti_db
      POSTGRES_USER: pizza_vitti
      POSTGRES_PASSWORD: pizza_vitti_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  postgres_data:
  media_data:
