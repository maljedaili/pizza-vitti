<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1024, initial-scale=1">
  <title>Pizza Vitti - Feature graphic</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1024px; height: 500px; margin: 0; overflow: hidden; }
    body {
      position: relative;
      display: grid;
      place-items: center;
      color: #fff;
      background: #23120b;
      font-family: Arial, Helvetica, sans-serif;
    }
    .pizza {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 52%;
    }
    .shade { position: absolute; inset: 0; background: rgba(20, 8, 4, 0.62); }
    .frame {
      position: absolute;
      inset: 22px;
      border: 2px solid rgba(255, 255, 255, 0.42);
    }
    main {
      position: relative;
      z-index: 1;
      width: 780px;
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 12px;
    }
    .logo {
      width: 82px;
      height: 82px;
      object-fit: contain;
    }
    h1 { margin: 0; font-size: 70px; line-height: 0.95; letter-spacing: 0; }
    .slogan { margin: 0; font-size: 29px; font-family: Georgia, serif; }
    .features {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .features span {
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: rgba(35, 18, 11, 0.72);
    }
  </style>
</head>
<body>
  <img class="pizza" src="../../shop/static/shop/img/hero/menu-pizza-vitti.jpg" alt="">
  <div class="shade"></div>
  <div class="frame"></div>
  <main>
    <img class="logo" src="../../android/store_icon.png" alt="">
    <h1>Pizza Vitti</h1>
    <p class="slogan">L'Italie à Bordeaux</p>
    <div class="features"><span>Menu</span><span>Commandes</span><span>Fidélité</span></div>
  </main>
</body>
</html>
