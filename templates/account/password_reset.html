{% extends "shop/base.html" %}
{% load static %}
{% block content %}
<section class="auth-page">
  <div class="auth-shell single">
    <div class="auth-card-vitti">
      <img src="{% static 'shop/img/logo-vitti-clean.png' %}" alt="Pizza Vitti" class="auth-logo small">
      <h2>Mot de passe oublié ?</h2>
      <p class="auth-subtitle">Entrez votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
      <form class="auth-form" method="post" action="{% url 'account_reset_password' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="auth-submit" type="submit">Envoyer le lien</button>
      </form>
      <p class="auth-bottom"><a href="{% url 'account_login' %}">Retour à la connexion</a></p>
    </div>
  </div>
</section>
{% endblock %}
