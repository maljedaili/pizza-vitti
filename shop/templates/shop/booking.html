{% extends 'shop/base.html' %}{% block content %}<section class="page-title reveal"><p class="eyebrow">{{ T.booking }}</p><h1>{{ T.booking_title }}</h1><p>{{ T.booking_text }}</p></section><section class="checkout reveal"><form class="card" method="post">{% csrf_token %}<h2>{{ T.book_table }}</h2><div class="form-grid"><p><label>{{ T.name }}<input name="name" required></label></p><p><label>{{ T.email }}<input type="email" name="email" required></label></p><p><label>{{ T.phone }}<input name="phone"></label></p><p><label>{{ T.guests }}<input type="number" name="guests" min="1" value="2" required></label></p><p><label>{{ T.date }}<input type="date" name="date" required></label></p><p><label>{{ T.time }}<input type="time" name="time" required></label></p><p class="wide"><label>{{ T.message }}<textarea name="message"></textarea></label></p></div><button>{{ T.booking_send }}</button></form><aside class="card booking-side"><h2>Pizza Vitti</h2><p>236 Rue d'Ornano<br>33000 Bordeaux France<br>+33 5 56 42 14 49</p><a class="button ghost" target="_blank" rel="noopener" href="https://maps.google.com/?q=Pizza+Vitti+236+Rue+d'Ornano+33000+Bordeaux">{{ T.open_maps }}</a></aside></section>{% endblock %}
