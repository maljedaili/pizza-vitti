{% extends 'shop/base.html' %}{% block content %}<section class="card reveal"><h1>{{ T.contact_title }}</h1><p>Pizza Vitti — 236 Rue d'Ornano, 33000 Bordeaux · +33 5 56 42 14 49</p><form method="post" class="form-grid">{% csrf_token %}<label>{{ T.name }}<input name="name" required></label><label>{{ T.email }}<input name="email" type="email" required></label><label>{{ T.phone }}<input name="phone"></label><label>{{ T.subject }}<input name="subject"></label><label class="wide">{{ T.message }}<textarea name="message" required></textarea></label><button class="button">{{ T.send }}</button></form></section><section class="map-section reveal"><div><p class="eyebrow">{{ T.address_label }}</p><h2>{{ T.find_us }}</h2><p>{{ T.address }}</p><a class="button" target="_blank" rel="noopener" href="https://maps.google.com/?q=Pizza+Vitti+236+Rue+d'Ornano+33000+Bordeaux">{{ T.open_maps }}</a></div><iframe loading="lazy" src="https://www.google.com/maps?q=Pizza%20Vitti%20236%20Rue%20d'Ornano%2033000%20Bordeaux&output=embed"></iframe></section>{% endblock %}
