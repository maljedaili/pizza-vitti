{% extends 'shop/base.html' %}{% block content %}<section class="card"><h1>{{ T.my_cart }}</h1>{% if items %}<form method="post" action="{% url 'shop:update_cart' %}">{% csrf_token %}{% for item in items %}<div class="cart-row"><span>{{ item.product.name }}</span><input type="number" name="qty_{{ item.product.id }}" value="{{ item.qty }}" min="1"><strong>{{ item.line_total }} €</strong></div>{% endfor %}<div class="total">{{ T.total }} <strong>{{ total }} €</strong></div><button class="button ghost">{{ T.update }}</button><a class="button" href="{{ url_checkout }}">{{ T.order }}</a></form>{% else %}<p>{{ T.empty_cart }}</p><a class="button" href="{{ url_menu }}">{{ T.see_menu }}</a>{% endif %}</section>{% endblock %}
