{% extends 'shop/base.html' %}{% block content %}<section class="detail"><div class="detail-img" style="background-image:url('{{ product.display_image }}')"></div><div><p class="eyebrow">{{ product.category.name }}</p><h1>{{ product.name }}</h1><p>{{ product.description }}</p><h2>{{ product.price }} € <small>/ {{ product.unit }}</small></h2><form method="post" action="{% url 'shop:add_to_cart' product.id %}" class="inline">{% csrf_token %}<input type="number" name="qty" value="1" min="1"><button class="button">Ajouter au panier</button></form></div></section>{% endblock %}
