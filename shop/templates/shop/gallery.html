{% extends 'shop/base.html' %}{% block content %}<section class="page-title reveal"><p class="eyebrow">{{ T.gallery }}</p><h1>{{ T.gallery_title }}</h1><p>{{ T.gallery_text }}</p></section><section class="gallery-grid reveal">{% for image in images %}<figure class="gallery-item" data-gallery-item data-src="{{ image.display_image }}" data-title="{{ image.title }}"><button class="gallery-button" type="button" aria-label="Ouvrir {{ image.title }}"><div class="gallery-img" {% if image.display_image %}style="background-image:url('{{ image.display_image }}')"{% endif %}></div></button><figcaption><strong>{{ image.title }}</strong>{% if image.caption %}<span>{{ image.caption }}</span>{% endif %}</figcaption></figure>{% empty %}<figure><div class="gallery-img"></div><figcaption><strong>{{ T.gallery }}</strong><span>{{ T.gallery_text }}</span></figcaption></figure>{% endfor %}</section><div class="lightbox" data-lightbox hidden><button class="lightbox-close" data-lightbox-close>×</button><button class="lightbox-prev" data-lightbox-prev>‹</button><img data-lightbox-img alt="Photo Pizza Vitti"><button class="lightbox-next" data-lightbox-next>›</button><p data-lightbox-title></p></div>{% endblock %}
