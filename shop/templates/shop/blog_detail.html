{% extends 'shop/base.html' %}{% block content %}<article class="card prose blog-detail"><p class="eyebrow">{{ T.blog }} · {{ post.created_at|date:'d F Y' }}</p><h1>{{ post.title }}</h1>{% if post.display_image %}<img class="blog-detail-img" src="{{ post.display_image }}" alt="{{ post.title }}">{% endif %}<p class="lead">{{ post.excerpt }}</p><div>{{ post.body|linebreaks }}</div><p><a class="button ghost" href="{{ url_blog }}">← {{ T.blog }}</a></p></article>{% endblock %}
